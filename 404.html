<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Página no encontrada" />
    <title>404 - Página no encontrada</title>
    <!-- Favicon (puedes reemplazar con tu propio ícono) -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Bootstrap icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" type="text/css" />
    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700,300italic,400italic,700italic" rel="stylesheet" type="text/css" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .error-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
        }
        .error-content {
            text-align: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: #0d6efd;
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .error-icon {
            font-size: 5rem;
            color: #6c757d;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .error-description {
            font-size: 1.2rem;
            color: #6c757d;
            max-width: 500px;
            margin: 0 auto 2rem;
        }

        footer {
            background-color: #212529;
            color: #fff;
            padding: 2rem 0;
        }
        footer a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
        }
        footer a:hover {
            color: #fff;
        }
        .footer-social a {
            font-size: 1.5rem;
            margin-left: 1rem;
            color: rgba(255,255,255,0.7);
        }
        .footer-social a:hover {
            color: #fff;
        }
        @media (max-width: 576px) {
            .error-code {
                font-size: 5rem;
            }
            .error-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Barra de navegación (similar a la de la landing page) -->
    <nav class="navbar navbar-light bg-dark static-top">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <!-- Logo (puedes cambiar la imagen o usar texto) -->
                <img src="assets/logo-alfa.png" alt="Logo" style="height: 40px;" />
                <a class="navbar-brand ms-2 text-white fw-bold" href="#">Mi Sitio</a>
            </div>
            <a class="btn btn-primary" href="index.html">Volver al inicio</a>
        </div>
    </nav>

    <!-- Sección principal de error -->
    <section class="error-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="error-content">
                        <!-- Icono decorativo -->
                        <div class="error-icon">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                        </div>
                        <!-- Código de error -->
                        <div class="error-code">404</div>
                        <!-- Título -->
                        <h1 class="error-title">¡Página no encontrada!</h1>
                        <!-- Descripción -->
                        <p class="error-description">
                            Lo sentimos, la página que estás buscando no existe o ha sido movida.
                            Puedes regresar al inicio o usar la navegación para encontrar lo que necesitas.
                        </p>
                        <!-- Botón de acción -->
                        <a href="index.html" class="btn btn-primary btn-home">
                            <i class="bi bi-house-door-fill me-2"></i>Ir al inicio
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start">
                    <p class="text-muted small mb-0">&copy; 2026 Mi Sitio. Todos los derechos reservados.</p>
                </div>
                <div class="col-lg-6 h-100 text-center text-lg-end my-auto">
                    <ul class="list-inline mb-0" id="socialLinks">
                        <li class="list-inline-item me-4">
                            <a href="#!"><i class="bi-facebook fs-3"></i></a>
                        </li>
                        <li class="list-inline-item me-4">
                            <a href="#!"><i class="bi-twitter fs-3"></i></a>
                        </li>
                        <li class="list-inline-item">
                            <a href="#!"><i class="bi-instagram fs-3"></i></a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS (opcional para algunos componentes) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
